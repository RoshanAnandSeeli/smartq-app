<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Portal</h2>
        <p style="color:#666; font-size:0.9rem; margin-bottom:10px;">Use your unique admin password.</p>
        {% if error %}
        <div style="background:#ffe9e9; color:#b30000; border:1px solid #ffc9c9; border-radius:6px; padding:8px; margin-bottom:10px; font-size:0.9rem;">
            {{ error }}
        </div>
        {% endif %}
        <form method="post">
            <input type="password" name="password" placeholder="Enter Admin Password" autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
